<!doctype html>
<html lang="en" data-i18n-title="about.title">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — NStore</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2B1220">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="wordmark">NStore</a>
      <div class="header-right">
        <nav class="site-nav" data-site-nav>
          <ul class="site-nav__links">
            <li><a href="index.html#shop" data-i18n="nav.shop"></a></li>
            <li><a href="index.html#shop" data-i18n="nav.clothing"></a></li>
            <li><a href="index.html#shop" data-i18n="nav.wigs"></a></li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
          <div class="lang-toggle">
            <button type="button" data-lang-btn="en">EN</button>
            <button type="button" data-lang-btn="fr">FR</button>
          </div>
        </nav>
        <div class="header-actions">
          <button type="button" class="cart-btn" data-cart-open>
            <span data-i18n="nav.cart"></span>
            <span class="cart-btn__count" data-cart-count>0</span>
          </button>
          <button type="button" class="nav-toggle" data-nav-toggle aria-label="Menu" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <p class="page-header__eyebrow" data-i18n="about.eyebrow"></p>
      <h1 class="page-header__title" data-i18n="about.title"></h1>
    </div>
  </section>

  <section class="page-content">
    <div class="container page-content__inner">
      <p data-i18n="about.intro"></p>
      <p data-i18n="about.body1"></p>
      <p data-i18n="about.body2"></p>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <div>
          <p class="site-footer__wordmark">NStore</p>
          <p class="site-footer__tagline" data-i18n="footer.tagline"></p>
        </div>
        <div>
          <p class="site-footer__tagline" data-i18n="footer.contact"></p>
          <p class="site-footer__tagline" id="footer-contact-value"></p>
        </div>
        <div class="site-footer__links">
          <a href="about.html" data-i18n="nav.about"></a>
          <a href="contact.html" data-i18n="nav.contact"></a>
          <a href="privacy.html" data-i18n="footer.privacy"></a>
        </div>
      </div>
      <div class="site-footer__bottom">
        <span>&copy; 2026 NStore. <span data-i18n="footer.rights"></span></span>
      </div>
    </div>
  </footer>

  <!-- Cart drawer -->
  <div class="overlay" data-cart-overlay></div>
  <aside class="cart-drawer" data-cart-drawer aria-label="Cart">
    <div class="cart-drawer__head">
      <h2 class="cart-drawer__title" data-i18n="cart.title"></h2>
      <button type="button" class="modal__close" data-cart-close aria-label="Close">&times;</button>
    </div>
    <div class="cart-drawer__body">
      <p data-cart-empty data-i18n="cart.empty"></p>
      <div data-cart-list></div>
    </div>
    <div class="cart-drawer__foot">
      <div class="cart-drawer__subtotalrow">
        <span data-i18n="cart.subtotal"></span>
        <span data-cart-subtotal>$0.00</span>
      </div>
      <button type="button" class="btn btn--primary btn--full" data-checkout-whatsapp data-i18n="cart.checkoutWhatsapp"></button>
      <button type="button" class="btn btn--outline btn--full" data-checkout-email data-i18n="cart.checkoutEmail"></button>
      <p class="cart-drawer__note" data-i18n="cart.note"></p>
    </div>
  </aside>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/pwa.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("footer-contact-value").textContent =
        (window.STORE_CONFIG && window.STORE_CONFIG.orderEmail) || "";
    });
  </script>
</body>
</html>
