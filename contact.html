<!doctype html>
<html lang="en" data-i18n-title="contact.title">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — NStore</title>
  <meta name="description" content="Reach NStore directly via WhatsApp or email for sizing, stock, and order questions.">
  <link rel="canonical" href="https://nstore.pages.dev/contact.html">
  <meta property="og:title" content="Contact — NStore">
  <meta property="og:description" content="Reach NStore directly via WhatsApp or email.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://nstore.pages.dev/contact.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2B1220">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="index.html" class="wordmark">NStore</a>
      <div class="header-right">
        <nav class="site-nav" data-site-nav>
          <ul class="site-nav__links">
            <li><a href="index.html#shop" data-i18n="nav.shop"></a></li>
            <li><a href="index.html#shop" data-i18n="nav.clothing"></a></li>
            <li><a href="index.html#shop" data-i18n="nav.wigs"></a></li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li><a href="contact.html" data-i18n="nav.contact"></a></li>
          </ul>
          <div class="lang-toggle">
            <button type="button" data-lang-btn="en">EN</button>
            <button type="button" data-lang-btn="fr">FR</button>
          </div>
        </nav>
        <div class="header-actions">
          <button type="button" class="cart-btn" data-cart-open>
            <span data-i18n="nav.cart"></span>
            <span class="cart-btn__count" data-cart-count>0</span>
          </button>
          <button type="button" class="nav-toggle" data-nav-toggle aria-label="Menu" aria-expanded="false">
            <span></span><span></span><span></span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <section class="page-header">
    <div class="container">
      <p class="page-header__eyebrow" data-i18n="contact.eyebrow"></p>
      <h1 class="page-header__title" data-i18n="contact.title"></h1>
    </div>
  </section>

  <section class="page-content">
    <div class="container page-content__inner">
      <p data-i18n="contact.intro"></p>

      <div class="contact-cards">
        <div class="contact-card" data-card-whatsapp>
          <p class="contact-card__label" data-i18n="contact.whatsappLabel"></p>
          <p class="contact-card__value" data-card-value></p>
        </div>
        <div class="contact-card" data-card-email>
          <p class="contact-card__label" data-i18n="contact.emailLabel"></p>
          <p class="contact-card__value" data-card-value></p>
        </div>
        <div class="contact-card" data-card-instagram>
          <p class="contact-card__label" data-i18n="contact.instagramLabel"></p>
          <p class="contact-card__value" data-card-value></p>
        </div>
        <div class="contact-card" data-card-address>
          <p class="contact-card__label" data-i18n="contact.addressLabel"></p>
          <p class="contact-card__value" data-card-value></p>
        </div>
      </div>

      <h2 data-i18n="contact.formTitle"></h2>
      <form class="contact-form" onsubmit="return false;">
        <div>
          <label data-i18n="contact.nameField"></label>
          <input type="text" data-contact-name>
        </div>
        <div>
          <label data-i18n="contact.messageField"></label>
          <textarea data-contact-message></textarea>
        </div>
        <div class="contact-form__actions">
          <button type="button" class="btn btn--primary" data-contact-whatsapp data-i18n="contact.sendWhatsapp"></button>
          <button type="button" class="btn btn--outline" data-contact-email data-i18n="contact.sendEmail"></button>
        </div>
      </form>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <div>
          <p class="site-footer__wordmark">NStore</p>
          <p class="site-footer__tagline" data-i18n="footer.tagline"></p>
        </div>
        <div>
          <p class="site-footer__tagline" data-i18n="footer.contact"></p>
          <p class="site-footer__tagline" id="footer-contact-value"></p>
        </div>
        <div class="site-footer__links">
          <a href="about.html" data-i18n="nav.about"></a>
          <a href="contact.html" data-i18n="nav.contact"></a>
          <a href="privacy.html" data-i18n="footer.privacy"></a>
        </div>
      </div>
      <div class="site-footer__bottom">
        <span>&copy; 2026 NStore. <span data-i18n="footer.rights"></span></span>
      </div>
    </div>
  </footer>

  <!-- Cart drawer -->
  <div class="overlay" data-cart-overlay></div>
  <aside class="cart-drawer" data-cart-drawer aria-label="Cart">
    <div class="cart-drawer__head">
      <h2 class="cart-drawer__title" data-i18n="cart.title"></h2>
      <button type="button" class="modal__close" data-cart-close aria-label="Close">&times;</button>
    </div>
    <div class="cart-drawer__body">
      <p data-cart-empty data-i18n="cart.empty"></p>
      <div data-cart-list></div>
    </div>
    <div class="cart-drawer__foot">
      <div class="cart-drawer__subtotalrow">
        <span data-i18n="cart.subtotal"></span>
        <span data-cart-subtotal>$0.00</span>
      </div>
      <button type="button" class="btn btn--primary btn--full" data-checkout-whatsapp data-i18n="cart.checkoutWhatsapp"></button>
      <button type="button" class="btn btn--outline btn--full" data-checkout-email data-i18n="cart.checkoutEmail"></button>
      <p class="cart-drawer__note" data-i18n="cart.note"></p>
    </div>
  </aside>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/contact.js"></script>
  <script src="js/pwa.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("footer-contact-value").textContent =
        (window.STORE_CONFIG && window.STORE_CONFIG.orderEmail) || "";
    });
  </script>
</body>
</html>
