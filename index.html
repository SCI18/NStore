<!doctype html>
<html lang="en" data-i18n-title="meta.title">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NStore — Clothing & Wigs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header__inner">
      <a href="#" class="wordmark">NStore</a>
      <nav class="site-nav">
        <ul class="site-nav__links">
          <li><a href="#shop" data-i18n="nav.shop"></a></li>
          <li><a href="#shop" data-swatch="clothing" data-i18n="nav.clothing"></a></li>
          <li><a href="#shop" data-swatch="wigs" data-i18n="nav.wigs"></a></li>
        </ul>
        <div class="header-actions">
          <div class="lang-toggle">
            <button type="button" data-lang-btn="en">EN</button>
            <button type="button" data-lang-btn="fr">FR</button>
          </div>
          <button type="button" class="cart-btn" data-cart-open>
            <span data-i18n="nav.cart"></span>
            <span class="cart-btn__count" data-cart-count>0</span>
          </button>
        </div>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="container">
      <div class="hero__inner">
        <p class="hero__eyebrow" data-i18n="hero.eyebrow"></p>
        <h1 class="hero__title" data-i18n="hero.title"></h1>
        <p class="hero__subtitle" data-i18n="hero.subtitle"></p>
        <a href="#shop" class="btn btn--gold hero__cta" data-i18n="hero.cta"></a>
      </div>

      <div class="swatch-rail">
        <p class="swatch-rail__label" data-i18n="swatch.label"></p>
        <div class="swatch-rail__row">
          <button type="button" class="swatch is-active" data-swatch="all">
            <span class="swatch__dot"></span>
            <span data-i18n="filter.all"></span>
          </button>
          <button type="button" class="swatch" data-swatch="clothing">
            <span class="swatch__dot"></span>
            <span data-i18n="filter.clothing"></span>
          </button>
          <button type="button" class="swatch" data-swatch="wigs">
            <span class="swatch__dot"></span>
            <span data-i18n="filter.wigs"></span>
          </button>
        </div>
      </div>
    </div>
  </section>

  <section class="shop" id="shop">
    <div class="container">
      <div class="shop__grid" data-product-grid></div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="container">
      <div class="site-footer__inner">
        <div>
          <p class="site-footer__wordmark">NStore</p>
          <p class="site-footer__tagline" data-i18n="footer.tagline"></p>
        </div>
        <div>
          <p class="site-footer__tagline" data-i18n="footer.contact"></p>
          <p class="site-footer__tagline" id="footer-contact-value"></p>
        </div>
      </div>
      <div class="site-footer__bottom">
        <span>&copy; 2026 NStore. <span data-i18n="footer.rights"></span></span>
      </div>
    </div>
  </footer>

  <!-- Cart drawer -->
  <div class="overlay" data-cart-overlay></div>
  <aside class="cart-drawer" data-cart-drawer aria-label="Cart">
    <div class="cart-drawer__head">
      <h2 class="cart-drawer__title" data-i18n="cart.title"></h2>
      <button type="button" class="modal__close" data-cart-close aria-label="Close">&times;</button>
    </div>
    <div class="cart-drawer__body">
      <p data-cart-empty data-i18n="cart.empty"></p>
      <div data-cart-list></div>
    </div>
    <div class="cart-drawer__foot">
      <div class="cart-drawer__subtotalrow">
        <span data-i18n="cart.subtotal"></span>
        <span data-cart-subtotal>$0.00</span>
      </div>
      <button type="button" class="btn btn--primary btn--full" data-checkout-whatsapp data-i18n="cart.checkoutWhatsapp"></button>
      <button type="button" class="btn btn--outline btn--full" data-checkout-email data-i18n="cart.checkoutEmail"></button>
      <p class="cart-drawer__note" data-i18n="cart.note"></p>
    </div>
  </aside>

  <!-- Product modal -->
  <div class="overlay" data-modal-overlay></div>
  <div class="modal" data-product-modal>
    <button type="button" class="modal__close" data-modal-close aria-label="Close">&times;</button>
    <div class="modal-product" data-modal-body></div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("footer-contact-value").textContent =
        (window.STORE_CONFIG && window.STORE_CONFIG.orderEmail) || "";
    });
  </script>
</body>
</html>
